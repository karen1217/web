services:
  - type: web
    name: photo-checker-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter         # MediaPipe is lightweight; no PyTorch needed
    envVars:
      - key: ALLOWED_ORIGIN
        sync: false       # set to your Vercel production URL in the Render dashboard
    healthCheckPath: /health
    autoDeploy: true
