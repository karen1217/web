services:
  - type: web
    name: photo-checker-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: standard        # needs ≥ 1 GB RAM for 3DDFA_V2 + PyTorch
    envVars:
      - key: ALLOWED_ORIGIN
        sync: false       # set to your Vercel production URL in the Render dashboard
    healthCheckPath: /health
    autoDeploy: true
